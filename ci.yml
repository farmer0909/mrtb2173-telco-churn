name: Telco Churn CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn pytest matplotlib seaborn

      - name: Create sample clean data for testing
        run: |
          python - <<'PYEOF'
          import pandas as pd
          import numpy as np
          import os
          data = {
            'customerID': [f'ID-{i}' for i in range(100)],
            'gender': ['Male','Female']*50,
            'SeniorCitizen': [0]*100,
            'Partner': ['Yes','No']*50,
            'Dependents': ['No']*100,
            'tenure': list(range(1,101)),
            'PhoneService': ['Yes']*100,
            'MultipleLines': ['No']*100,
            'InternetService': ['Fiber optic']*100,
            'OnlineSecurity': ['No']*100,
            'OnlineBackup': ['No']*100,
            'DeviceProtection': ['No']*100,
            'TechSupport': ['No']*100,
            'StreamingTV': ['No']*100,
            'StreamingMovies': ['No']*100,
            'Contract': ['Month-to-month']*100,
            'PaperlessBilling': ['Yes']*100,
            'PaymentMethod': ['Electronic check']*100,
            'MonthlyCharges': [float(i+20) for i in range(100)],
            'TotalCharges': [float((i+1)*20) for i in range(100)],
            'Churn': ['No']*80 + ['Yes']*20
          }
          df = pd.DataFrame(data)
          os.makedirs('data', exist_ok=True)
          df.to_csv('data/telco_clean.csv', index=False)
          print("Test data created.")
          PYEOF

      - name: Run data validation script
        run: python scripts/validate_data.py data/telco_clean.csv

      - name: Run pytest
        run: pytest tests/ -v --tb=short
